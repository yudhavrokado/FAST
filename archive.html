<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FAST System Settlement — Arsip Invoice & Settlement">
  <title>Arsip Invoice & Settlement — FAST Settlement</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-root"></div>
    <div class="main-content">
      <div id="topnav-root"></div>
      <div class="page-container">
        <div class="animate-fade-in">

          <div class="mb-4">
            <h1 style="font-size:22px;font-weight:700">Arsip Invoice & Settlement</h1>
            <p class="text-muted mt-1 mb-0" style="font-size:13px">Kumpulan arsip invoice yang telah diverifikasi dan selesai diproses.</p>
          </div>

          <!-- Tab & Actions -->
          <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
            <div class="fast-tab-container">
              <button class="fast-tab-btn active" onclick="switchArchiveTab('output',this)">Output (Approved)</button>
              <button class="fast-tab-btn" onclick="switchArchiveTab('raw',this)">Raw Data (Semua)</button>
            </div>
            <div class="d-flex gap-2 align-items-center">
              <div class="fast-search-wrap">
                <i class="bi bi-search" style="font-size:13px;color:var(--fast-text-faint)"></i>
                <input type="text" placeholder="Cari ID / KKKS..." id="archSearch" oninput="renderArchive()">
              </div>
              <button class="btn btn-fast-primary" style="padding:8px 20px;border-radius:8px" onclick="exportCSV()">
                <i class="bi bi-download"></i> Export to Excel (.csv)
              </button>
            </div>
          </div>

          <!-- Output Tab -->
          <div id="tab-output">
            <div class="fast-table-wrap">
              <div class="table-responsive">
                <table class="table mb-0">
                  <thead>
                    <tr>
                      <th>No. Invoice</th>
                      <th>KKKS / Seller</th>
                      <th>Crude</th>
                      <th>Tanggal Invoice</th>
                      <th class="text-end">Volume (BBL)</th>
                      <th class="text-end">Harga (USD/bbl)</th>
                      <th class="text-end">Total (USD)</th>
                      <th class="text-center">Status</th>
                      <th>Aksi</th>
                    </tr>
                  </thead>
                  <tbody id="archive-output-tbody"></tbody>
                </table>
              </div>
              <div class="table-footer-bar">
                <span id="archive-output-count">0 record</span>
              </div>
            </div>
          </div>

          <!-- Raw Data Tab -->
          <div id="tab-raw" style="display:none">
            <div class="fast-table-wrap">
              <div class="table-responsive">
                <table class="table mb-0">
                  <thead>
                    <tr>
                      <th>Lifting ID</th>
                      <th>Status</th>
                      <th>Seller</th>
                      <th>Crude</th>
                      <th>B/L Number</th>
                      <th>Periode</th>
                      <th class="text-end">Volume</th>
                      <th>Tipe Transaksi</th>
                      <th>Aksi</th>
                    </tr>
                  </thead>
                  <tbody id="archive-raw-tbody"></tbody>
                </table>
              </div>
              <div class="table-footer-bar">
                <span id="archive-raw-count">0 record</span>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/archive.js"></script>
</body>
</html>
