<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FAST System Settlement — Edit Invoice Submission">
  <title>Edit Lifting — FAST Settlement</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-root"></div>
    <div class="main-content">
      <div id="topnav-root"></div>
      <div class="page-container">
        <div class="animate-fade-in">

          <!-- Header -->
          <div class="d-flex align-items-center gap-3 mb-4">
            <a href="submission.html" class="btn btn-fast-outline" style="padding:8px 12px;border-radius:10px">
              <i class="bi bi-chevron-left"></i> Kembali
            </a>
            <div class="flex-grow-1">
              <h1 style="font-size:22px;font-weight:700">Edit Invoice Submission</h1>
              <p class="text-muted mt-1 mb-0" style="font-size:14px">
                Internal ID: <span style="color:var(--fast-accent);font-family:monospace" id="display-id">LFT-20260301-A1B2</span>
              </p>
            </div>
            <span class="badge rounded-pill" id="status-badge" style="font-size:12px;padding:6px 14px">Draft</span>
          </div>

          <!-- Two Column Layout -->
          <div class="fast-card" style="border-radius:12px">
            <div class="row">
              <!-- Left: Data Lifting -->
              <div class="col-lg-5 pe-lg-4" style="border-right:1px solid var(--fast-border)">
                <h6 class="fw-semibold mb-4 d-flex align-items-center gap-2" style="color:var(--fast-accent)">
                  <i class="bi bi-activity"></i> Rincian Data Lifting Minyak
                </h6>
                <div class="row g-3">
                  <div class="col-12">
                    <label class="form-label-sm">Tipe Transaksi <span class="text-danger">*</span></label>
                    <select class="form-select fast-input" id="e-pembelian">
                      <option value="Import">Import</option>
                      <option value="Domestik Reguler" selected>Domestik Reguler</option>
                      <option value="Domestik Proforma Lifting">Domestik Proforma Lifting</option>
                    </select>
                  </div>
                  <div class="col-6">
                    <label class="form-label-sm">Tipe Komoditas <span class="text-danger">*</span></label>
                    <select class="form-select fast-input" id="e-commodity">
                      <option value="Crude">Crude</option>
                      <option value="Non Crude">Non Crude</option>
                    </select>
                  </div>
                  <div class="col-6">
                    <label class="form-label-sm">Periode Lifting <span class="text-danger">*</span></label>
                    <div class="row g-2">
                      <div class="col-7"><select class="form-select fast-input" id="e-bulan"><option value="03" selected>Maret</option><option value="04">April</option><option value="05">Mei</option></select></div>
                      <div class="col-5"><select class="form-select fast-input" id="e-tahun"><option value="2026" selected>2026</option></select></div>
                    </div>
                  </div>
                  <div class="col-6">
                    <label class="form-label-sm">Seller <span class="text-danger">*</span></label>
                    <select class="form-select fast-input" id="e-seller">
                      <option value="PT KKKS Alpha Energi" selected>PT KKKS Alpha Energi</option>
                      <option value="PT KKKS Bravo Petroleum">PT KKKS Bravo Petroleum</option>
                      <option value="Pertamina EP">Pertamina EP</option>
                      <option value="Shell Trading & Shipping">Shell Trading & Shipping</option>
                    </select>
                  </div>
                  <div class="col-6">
                    <label class="form-label-sm">Cargo/Produk <span class="text-danger">*</span></label>
                    <select class="form-select fast-input" id="e-cargo">
                      <option value="SLC (Sumatera Light Crude)" selected>SLC (Sumatera Light Crude)</option>
                      <option value="Attaka">Attaka</option>
                      <option value="Duri">Duri</option>
                      <option value="Belida">Belida</option>
                    </select>
                  </div>
                  <div class="col-6">
                    <label class="form-label-sm">B/L Dated <span class="text-danger">*</span></label>
                    <input type="date" class="form-control fast-input" id="e-blDate" value="2026-03-01">
                  </div>
                  <div class="col-6">
                    <label class="form-label-sm">B/L Number <span class="text-danger">*</span></label>
                    <input type="text" class="form-control fast-input" id="e-blNumber" value="BL-2026/001">
                  </div>
                  <div class="col-6">
                    <label class="form-label-sm">Tipe Lifting <span class="text-danger">*</span></label>
                    <select class="form-select fast-input" id="e-tipeLifting"><option value="vessel" selected>Vessel</option><option value="pipeline">Pipeline</option></select>
                  </div>
                  <div class="col-6">
                    <label class="form-label-sm">Nama Vessel</label>
                    <input type="text" class="form-control fast-input" id="e-vessel" value="MT Pertamina Prime">
                  </div>
                  <div class="col-6">
                    <label class="form-label-sm">Loading Port</label>
                    <select class="form-select fast-input" id="e-loadPort"><option value="Dumai" selected>Dumai</option></select>
                  </div>
                  <div class="col-6">
                    <label class="form-label-sm">Discharge Port</label>
                    <select class="form-select fast-input" id="e-dischargePort"><option value="Cilacap" selected>Cilacap</option></select>
                  </div>
                  <div class="col-6">
                    <label class="form-label-sm">Volume Realisasi (bbls) <span class="text-danger">*</span></label>
                    <input type="number" class="form-control fast-input" id="e-volume" value="250000">
                  </div>
                </div>

                <div class="mt-4 pt-3" style="border-top:1px dashed var(--fast-border)">
                  <label class="form-label-sm">Remarks (Free Text)</label>
                  <textarea class="form-control fast-input" rows="3" id="e-remarks" placeholder="Tulis catatan tambahan..."></textarea>
                </div>

                <div class="mt-4 pt-3 d-flex justify-content-end gap-2" style="border-top:1px solid var(--fast-border)" id="lifting-buttons">
                  <button class="btn text-danger me-auto" style="background:transparent;border:none;font-weight:600;font-size:13px" onclick="showToast('Data berhasil dihapus','warning')">
                    <i class="bi bi-trash"></i> Hapus Draft
                  </button>
                  <button class="btn btn-fast-outline" onclick="showToast('Draft berhasil diperbarui')"><i class="bi bi-save"></i> Simpan Draft</button>
                  <button class="btn btn-fast-primary" style="background:var(--fast-success);border:none" onclick="lockLifting()">
                    <i class="bi bi-check2-square"></i> Kunci Data Lifting
                  </button>
                </div>
              </div>

              <!-- Right: Billing Input -->
              <div class="col-lg-7 ps-lg-4" id="billing-section" style="display:none">
                <h6 class="fw-semibold mb-4 d-flex align-items-center gap-2" style="color:var(--fast-success)">
                  <i class="bi bi-currency-dollar"></i> Detail Penagihan & Keuangan
                </h6>
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label-sm">Kind of Transaction <span class="text-danger">*</span></label>
                    <select class="form-select fast-input" id="e-kindOfTransaction">
                      <option value="Provisional" selected>Provisional</option>
                      <option value="Final">Final</option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label-sm">Skema Komersialisasi</label>
                    <select class="form-select fast-input" id="e-skema">
                      <option value="">-- Pilih Skema --</option>
                      <option value="Election In Kind (SKK Migas)">Election In Kind (SKK Migas)</option>
                      <option value="Election In Kind (KKKS or SHU)">Election In Kind (KKKS or SHU)</option>
                      <option value="Election Not to Take In Kind (SKK Migas)">Election Not to Take In Kind (SKK Migas)</option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label-sm">Invoice Number <span class="text-danger">*</span></label>
                    <input type="text" class="form-control fast-input" id="e-invoiceNumber" placeholder="INV/2026/...">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label-sm">Invoice Date <span class="text-danger">*</span></label>
                    <input type="date" class="form-control fast-input" id="e-invoiceDate">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label-sm">No. PO MySAP</label>
                    <input type="text" class="form-control fast-input" placeholder="Masukkan No. PO MySAP...">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label-sm">No. PO Document</label>
                    <input type="text" class="form-control fast-input" placeholder="Masukkan No. PO Document...">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label-sm">No. Faktur Pajak</label>
                    <input type="text" class="form-control fast-input" placeholder="001.xxx-xx...">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label-sm">Tanggal Faktur Pajak</label>
                    <input type="date" class="form-control fast-input">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label-sm">Due Date Provisional <span class="text-danger">*</span></label>
                    <input type="date" class="form-control fast-input" id="e-dueDateProv">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label-sm">Due Date Final</label>
                    <input type="date" class="form-control fast-input" id="e-dueDateFinal">
                  </div>
                  <div class="col-12">
                    <label class="form-label-sm">Total Price (USD/bbl) <span class="text-danger">*</span></label>
                    <input type="number" step="0.01" class="form-control fast-input" id="e-priceUsd" placeholder="0.00">
                  </div>
                </div>

                <!-- Upload Documents -->
                <div class="mt-4 mb-3">
                  <h6 style="font-size:13px;font-weight:600;letter-spacing:0.3px" class="mb-3">Upload Dokumen Penagihan</h6>
                  <div class="row g-3">
                    <div class="col-6 col-md-3">
                      <div class="card-upload">
                        <div class="rounded-circle d-flex align-items-center justify-content-center" style="width:36px;height:36px;background:#f8fafc"><i class="bi bi-upload" style="font-size:16px"></i></div>
                        <span style="font-size:11px;font-weight:600">Invoice PDF</span>
                        <span style="font-size:9px;color:var(--fast-text-muted)">Belum ada file</span>
                      </div>
                    </div>
                    <div class="col-6 col-md-3">
                      <div class="card-upload">
                        <div class="rounded-circle d-flex align-items-center justify-content-center" style="width:36px;height:36px;background:#f8fafc"><i class="bi bi-upload" style="font-size:16px"></i></div>
                        <span style="font-size:11px;font-weight:600">B/L PDF</span>
                        <span style="font-size:9px;color:var(--fast-text-muted)">Belum ada file</span>
                      </div>
                    </div>
                    <div class="col-6 col-md-3">
                      <div class="card-upload">
                        <div class="rounded-circle d-flex align-items-center justify-content-center" style="width:36px;height:36px;background:#f8fafc"><i class="bi bi-upload" style="font-size:16px"></i></div>
                        <span style="font-size:11px;font-weight:600">Faktur Pajak</span>
                        <span style="font-size:9px;color:var(--fast-text-muted)">Belum ada file</span>
                      </div>
                    </div>
                    <div class="col-6 col-md-3">
                      <div class="card-upload">
                        <div class="rounded-circle d-flex align-items-center justify-content-center" style="width:36px;height:36px;background:#f8fafc"><i class="bi bi-upload" style="font-size:16px"></i></div>
                        <span style="font-size:11px;font-weight:600">Dokumen Lain</span>
                        <span style="font-size:9px;color:var(--fast-text-muted)">Lainnya</span>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4 pt-3" style="border-top:1px solid var(--fast-border)">
                  <a href="submission.html" class="btn btn-fast-outline">Batalkan</a>
                  <button class="btn btn-fast-primary" onclick="submitInvoice()">
                    <i class="bi bi-check-circle"></i> Finalisasi & Submit
                  </button>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/edit-lifting.js"></script>
</body>
</html>
