<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FAST System Settlement — Exception Signal Tracking">
  <title>Exception Signal — FAST Settlement</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-root"></div>
    <div class="main-content">
      <div id="topnav-root"></div>
      <div class="page-container">
        <div class="animate-fade-in">

          <!-- Header -->
          <div class="mb-4">
            <div class="d-flex align-items-center gap-2 mb-1">
              <div class="pulse-dot"></div>
              <h1 style="font-size:22px;font-weight:700;margin:0">Exception Signal</h1>
            </div>
            <p class="text-muted mb-0" style="margin-left:22px;font-size:13px">
              Daftar settlement yang mendekati atau melampaui jatuh tempo pembayaran namun belum dibayar.
            </p>
          </div>

          <!-- Summary Cards -->
          <div class="row g-3 mb-4" id="signal-summary"></div>

          <!-- Filter Bar -->
          <div class="fast-card mb-3" style="padding:12px 16px">
            <div class="d-flex flex-wrap justify-content-between align-items-center gap-2">
              <div class="d-flex flex-wrap gap-2" id="level-filters"></div>
              <div class="fast-search-wrap">
                <i class="bi bi-search" style="font-size:13px;color:var(--fast-text-faint)"></i>
                <input type="text" placeholder="Cari ID / KKKS..." id="sigSearch" oninput="renderSignals()">
              </div>
            </div>
          </div>

          <!-- Table -->
          <div class="fast-table-wrap">
            <div class="table-responsive">
              <table class="table mb-0">
                <thead>
                  <tr>
                    <th>Level</th>
                    <th>ID Invoice</th>
                    <th>KKKS</th>
                    <th>Tgl Lifting</th>
                    <th>Jatuh Tempo</th>
                    <th class="text-center">Sisa Hari</th>
                    <th>Volume (BBLS)</th>
                    <th>Total (USD)</th>
                    <th>Status</th>
                    <th>Aksi</th>
                  </tr>
                </thead>
                <tbody id="signal-tbody"></tbody>
              </table>
            </div>
            <div class="table-footer-bar">
              <span id="signal-count">Total 0 exception signal aktif</span>
              <span style="color:var(--fast-text-faint);font-size:11px">Diperbarui otomatis setiap hari</span>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/exception-signal.js"></script>
</body>
</html>
