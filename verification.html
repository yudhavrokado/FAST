<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FAST System Settlement — Data Verification Inbox">
  <title>Data Verification — FAST Settlement</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-root"></div>
    <div class="main-content">
      <div id="topnav-root"></div>
      <div class="page-container">
        <div class="animate-fade-in">

          <div class="mb-4">
            <h1 style="font-size:22px;font-weight:700">Data Verification Inbox</h1>
            <p class="text-muted mt-1 mb-0" style="font-size:13px">Antrean verifikasi L1 dan pengelolaan perbaikan dokumen lifting.</p>
          </div>

          <!-- Filters -->
          <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
            <div class="fast-search-wrap">
              <i class="bi bi-search" style="color:var(--fast-text-muted);font-size:14px"></i>
              <input type="text" placeholder="Cari ID atau KKKS..." id="vSearch" oninput="renderVerification()">
            </div>
            <div class="d-flex align-items-center gap-2">
              <span class="text-muted" style="font-size:13px;font-weight:500">Status:</span>
              <select class="form-select fast-input" style="width:auto;padding:8px 12px" id="vFilter" onchange="renderVerification()">
                <option>Semua Status</option>
                <option>Menunggu Review</option>
                <option>Butuh Perbaikan</option>
                <option>Approved</option>
              </select>
            </div>
          </div>

          <!-- Table -->
          <div class="fast-table-wrap">
            <div class="table-responsive">
              <table class="table mb-0">
                <thead>
                  <tr>
                    <th>ID Referensi (B/L)</th>
                    <th>Entitas (KKKS)</th>
                    <th>Tanggal Lifting</th>
                    <th>Klaim Vol (BBL)</th>
                    <th>Status Perkara</th>
                    <th>Catatan Terakhir</th>
                    <th>Tindakan Lanjut</th>
                  </tr>
                </thead>
                <tbody id="v-tbody"></tbody>
              </table>
            </div>
            <div class="table-footer-bar">
              <span id="v-count">Menampilkan 0 baris dokumen aktif</span>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/verification.js"></script>
</body>
</html>
